kind = "mobile"
previewPath = "/study-mobile/"
title = "AI Study Companion Mobile"
version = "1.0.0"
id = "artifacts/study-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/study-mobile/" ]
localPort = 21124

[services.development]
run = "pnpm --filter @workspace/study-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/study-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/study-mobile", "run", "serve" ]

[services.env]
PORT = "21124"
BASE_PATH = "/study-mobile/"
