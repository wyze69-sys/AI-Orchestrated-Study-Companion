kind = "web"
previewPath = "/"
title = "AI Study Companion"
version = "1.0.0"
id = "artifacts/study-companion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20734

[services.development]
run = "pnpm --filter @workspace/study-companion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/study-companion", "run", "build" ]
publicDir = "artifacts/study-companion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20734"
BASE_PATH = "/"
